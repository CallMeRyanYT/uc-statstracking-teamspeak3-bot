services:
  # Stats Bot
  uc-stats-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uc-stats-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Use host.docker.internal when the TS3 server runs on the same Windows PC.
      - TS3_HOST=${TS3_HOST:-host.docker.internal}
      - TS3_QUERY_PORT=${TS3_QUERY_PORT:-10011}
      - TS3_QUERY_USER=${TS3_QUERY_USER:-serveradmin}
      - TS3_QUERY_PASS=${TS3_QUERY_PASS}
      - TS3_SERVER_ID=${TS3_SERVER_ID:-1}
      - TS3_SERVER_PORT=${TS3_SERVER_PORT:-9987}
      - TS3_CONNECT_TIMEOUT_MS=${TS3_CONNECT_TIMEOUT_MS:-10000}
      - TS3_BOT_NICKNAME=${TS3_BOT_NICKNAME:-UC Stats Bot}
      - TS3_ADMIN_GROUP_IDS=${TS3_ADMIN_GROUP_IDS:-6}
      - AFK_AWAY_THRESHOLD_MINUTES=${AFK_AWAY_THRESHOLD_MINUTES:-5}
      - EXCLUDED_CHANNELS=${EXCLUDED_CHANNELS:-}
      - BOT_NICKNAMES=${BOT_NICKNAMES:-UC Stats Bot,serveradmin,UC Music Bot,Admonus}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-60000}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_REPORT_INTERVAL_MINUTES=${DISCORD_REPORT_INTERVAL_MINUTES:-60}
      - WEB_PORT=${WEB_PORT:-3000}
      - HOST_WEB_PORT=${HOST_WEB_PORT:-3000}
      - ADMIN_PORT=${ADMIN_PORT:-3001}
      - HOST_ADMIN_PORT=${HOST_ADMIN_PORT:-3001}
      - TZ=${TZ:-UTC}
    volumes:
      # Persist the SQLite database across container restarts.
      - stats_data:/app/data
    ports:
      # Web dashboard on Windows. Defaults to http://localhost:3000.
      - "${HOST_WEB_PORT:-3000}:${WEB_PORT:-3000}"
      # Destructive admin API is reachable only from this Windows laptop.
      - "127.0.0.1:${HOST_ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    extra_hosts:
      # Allows Docker to reach services running on the Windows host.
      - "host.docker.internal:host-gateway"

  # Optional Cloudflare Tunnel for a public dashboard URL without port forwarding.
  # The quick tunnel URL is printed with: docker logs uc-stats-tunnel
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: uc-stats-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://uc-stats-bot:${WEB_PORT:-3000}
    depends_on:
      - uc-stats-bot

volumes:
  stats_data:
    name: uc_stats_data
